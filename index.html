<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icarus Borsası | SOL Yatır</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(139, 92, 246, 0.3); }
        .glow-text { text-shadow: 0 0 10px rgba(139, 92, 246, 0.8); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen antialiased">

    <div class="glass-panel p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
        
        <h2 class="text-3xl font-extrabold mb-2 glow-text text-purple-500">ICARUS EXCHANGE</h2>
        <p class="text-gray-400 text-sm mb-8">Yatırımcı Paneline Hoş Geldiniz</p>

        <div id="step1">
            <p class="text-sm text-gray-300 mb-4">İşlem yapmak için Phantom cüzdanınızı bağlayın.</p>
            <button id="connectWalletBtn" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 px-4 rounded-xl transition duration-300 shadow-[0_0_15px_rgba(147,51,234,0.5)]">
                Phantom Cüzdanı Bağla
            </button>
        </div>

        <div id="step2" class="hidden">
            <div class="bg-black/50 p-4 rounded-xl border border-gray-700 mb-6">
                <p class="text-xs text-gray-400 mb-1">Bağlı Cüzdanınız:</p>
                <p id="userWalletAddress" class="text-sm font-mono text-green-400 truncate">...</p>
            </div>

            <div class="text-left mb-6">
                <label class="block text-sm text-gray-400 mb-2">Alıcı (Kurucu) Adresi:</label>
                <input type="text" id="receiverAddress" value="1d216R3J9LLt34NgzitsB713kTQQgHTY1kF2wEAi6gm" readonly 
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-gray-500 font-mono focus:outline-none">
            </div>

            <div class="text-left mb-6">
                <label class="block text-sm text-gray-400 mb-2">Yatırılacak Miktar (SOL):</label>
                <input type="number" id="solAmount" value="1" step="0.1" min="0.1"
                       class="w-full bg-gray-900 border border-purple-500 rounded-lg p-3 text-white font-bold focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <button id="sendSolBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-extrabold py-4 px-4 rounded-xl transition duration-300 shadow-[0_0_20px_rgba(59,130,246,0.6)] uppercase tracking-wide">
                Solana Gönder & Satın Al
            </button>
            <p id="statusMessage" class="mt-4 text-sm font-bold text-yellow-400"></p>
        </div>

    </div>

    <script>
        let userWalletAddress = null;

        // Phantom Cüzdan Bağlama İşlemi
        document.getElementById('connectWalletBtn').addEventListener('click', async () => {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const response = await window.solana.connect();
                    userWalletAddress = response.publicKey.toString();
                    
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    document.getElementById('userWalletAddress').innerText = userWalletAddress;
                } catch (err) {
                    alert("Cüzdan bağlantısı reddedildi.");
                }
            } else {
                alert("Lütfen Phantom Cüzdan eklentisini kurun!");
                window.open("https://phantom.app/", "_blank");
            }
        });

        // SOL Transfer İşlemi
        document.getElementById('sendSolBtn').addEventListener('click', async () => {
            if (!userWalletAddress) return;

            const receiverAddressString = document.getElementById('receiverAddress').value;
            const solAmount = parseFloat(document.getElementById('solAmount').value);
            const statusText = document.getElementById('statusMessage');

            try {
                statusText.innerText = "İşlem hazırlanıyor, cüzdanınızı kontrol edin...";
                statusText.style.color = "#fbbf24"; // Sarı
                
                // Solana Ağına Bağlan (Mainnet)
                const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'), 'confirmed');
                
                const fromPubkey = new solanaWeb3.PublicKey(userWalletAddress);
                
                // ADRES KONTROLÜ - Eğer adres hatalıysa burada sistem duracak
                const toPubkey = new solanaWeb3.PublicKey(receiverAddressString);
                
                const lamports = solAmount * solanaWeb3.LAMPORTS_PER_SOL;

                const transaction = new solanaWeb3.Transaction().add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: fromPubkey,
                        toPubkey: toPubkey,
                        lamports: lamports,
                    })
                );

                const { blockhash } = await connection.getLatestBlockhash();
                transaction.recentBlockhash = blockhash;
                transaction.feePayer = fromPubkey;

                const signedTransaction = await window.solana.signTransaction(transaction);
                const signature = await connection.sendRawTransaction(signedTransaction.serialize());
                
                statusText.innerText = "İşlem onaylanıyor... Lütfen bekleyin.";
                
                await connection.confirmTransaction(signature, 'confirmed');
                
                statusText.style.color = "#4ade80"; // Yeşil
                statusText.innerText = "Başarılı! SOL transfer edildi.";
                
            } catch (err) {
                console.error(err);
                statusText.style.color = "#ef4444"; // Kırmızı
                
                // Hata mesajını özelleştiriyoruz ki adres hatasını anlayabilelim
                if(err.message && err.message.includes("Invalid public key")) {
                    statusText.innerText = "Hata: Kurucu cüzdan adresi geçersiz! (Solana adresi olmalı)";
                } else {
                    statusText.innerText = "İşlem iptal edildi veya başarısız oldu.";
                }
            }
        });
    </script>
</body>
</html>
