<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icarus Borsası | Kolay Al/Sat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .paribu-green { background-color: #8DC63F; }
        .paribu-green-text { color: #8DC63F; }
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fomo-row { animation: slideDown 0.5s ease-out forwards; background-color: rgba(141, 198, 63, 0.05); }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-900 antialiased overflow-x-hidden">

    <div id="landingPage" class="min-h-screen flex flex-col bg-white">
        <nav class="flex justify-between items-center px-6 md:px-10 py-5 border-b border-gray-100">
            <div class="text-3xl font-extrabold tracking-tighter paribu-green-text">ICARUS</div>
            <div class="hidden md:flex space-x-8 font-semibold text-sm text-gray-600">
                <a href="#" class="hover:text-black transition">Ana sayfa</a>
                <a href="#" class="hover:text-black transition">Piyasalar</a>
                <a href="#" class="hover:text-black transition">Kolay Al/Sat</a>
            </div>
            <div>
                <button onclick="enterExchange()" class="font-semibold text-sm mr-4 hover:text-green-600 transition">Giriş yap</button>
                <button onclick="enterExchange()" class="paribu-green text-white font-bold py-2 px-6 rounded hover:bg-green-600 transition">Hesap oluştur</button>
            </div>
        </nav>
        <div class="flex-grow flex flex-col items-center justify-center text-center px-4">
            <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-4 text-[#1E2225]">
                Yarının dünyası<span class="paribu-green-text">.</span>
            </h1>
            <p class="text-lg md:text-xl text-gray-500 mb-10 max-w-2xl">
                Kriptoyu keşfedin.<br>İhtiyacınız olan her şey tek uygulamada.
            </p>
            <button onclick="enterExchange()" class="paribu-green text-white font-bold py-4 px-10 rounded-lg text-lg hover:bg-green-600 transition shadow-lg">
                Hemen Başla
            </button>
        </div>
    </div>

    <div id="dashboardPage" class="hidden min-h-screen flex flex-col">
        <nav class="bg-white flex justify-between items-center px-6 py-4 border-b border-gray-200 shadow-sm z-10 relative">
            <div class="text-2xl font-extrabold tracking-tighter paribu-green-text cursor-pointer" onclick="exitExchange()">ICARUS</div>
            <div class="flex items-center space-x-4">
                <button id="connectWalletBtn" class="bg-gray-100 text-gray-700 hover:bg-gray-200 font-bold py-2 px-4 rounded border border-gray-300 text-sm transition flex items-center">
                    Cüzdanı Bağla
                </button>
                <span id="walletAddressDisplay" class="hidden text-sm font-mono font-bold bg-green-50 px-4 py-2 rounded text-green-700 border border-green-200"></span>
            </div>
        </nav>

        <div class="flex-grow container mx-auto px-4 py-6">
            <div class="grid lg:grid-cols-3 gap-6 h-full">
                
                <div class="lg:col-span-2 flex flex-col space-y-6">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 flex flex-col" style="height: 450px;">
                        <h2 class="text-lg font-bold mb-3 flex items-center text-gray-800">SOL/USDT Canlı Piyasa</h2>
                        <div class="flex-grow w-full h-full rounded-lg overflow-hidden border border-gray-100">
                            <div class="tradingview-widget-container h-full w-full">
                              <div id="tradingview_sol" class="h-full w-full"></div>
                              <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                              <script type="text/javascript">
                              new TradingView.widget({
                                "autosize": true,
                                "symbol": "BINANCE:SOLUSDT",
                                "interval": "15",
                                "timezone": "Europe/Istanbul",
                                "theme": "light",
                                "style": "1",
                                "locale": "tr",
                                "enable_publishing": false,
                                "backgroundColor": "#ffffff",
                                "hide_top_toolbar": false,
                                "hide_legend": false,
                                "container_id": "tradingview_sol"
                              });
                              </script>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 flex flex-col flex-grow">
                        <h2 class="text-lg font-bold mb-3 text-gray-800 flex justify-between items-center">
                            <span>Son İşlemler</span>
                            <span class="flex items-center text-xs text-green-500 bg-green-50 px-2 py-1 rounded-full"><span class="w-2 h-2 rounded-full bg-green-500 mr-1 animate-pulse"></span>Canlı</span>
                        </h2>
                        <div class="overflow-hidden flex-grow relative">
                            <table class="w-full text-left text-sm text-gray-600">
                                <thead class="text-xs text-gray-400 uppercase bg-gray-50 border-b border-gray-100">
                                    <tr><th class="px-4 py-2">Zaman</th><th class="px-4 py-2">Cüzdan</th><th class="px-4 py-2 text-right">Miktar (SOL)</th></tr>
                                </thead>
                                <tbody id="fomoTableBody" class="divide-y divide-gray-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col h-fit sticky top-6">
                    <h2 class="text-2xl font-extrabold mb-6 border-b border-gray-100 pb-3 text-gray-800">Kolay Alış</h2>
                    
                    <div class="bg-gray-50 p-4 rounded-xl mb-2 border border-gray-200 transition-all focus-within:border-green-400 focus-within:ring-1">
                        <label class="block text-xs text-gray-500 font-bold mb-1">ÖDENECEK</label>
                        <div class="flex items-center">
                            <input type="number" id="solInput" value="0.1" step="0.01" min="0.01" class="w-full bg-transparent text-3xl font-bold text-gray-800 focus:outline-none">
                            <span class="font-bold text-gray-400 text-lg">SOL</span>
                        </div>
                    </div>

                    <div class="flex justify-center -my-3 relative z-10">
                        <div class="bg-white border border-gray-200 p-2 rounded-full shadow-sm">
                            <svg class="w-5 h-5 text-green-500 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                        </div>
                    </div>

                    <div class="bg-green-50 p-4 rounded-xl mb-6 border border-green-100">
                        <label class="block text-xs text-green-600 font-bold mb-1">ALINACAK (Tahmini)</label>
                        <div class="flex items-center">
                            <input type="text" id="icrOutput" value="10,000" readonly class="w-full bg-transparent text-3xl font-bold text-green-600 focus:outline-none">
                            <span class="font-bold text-green-600/50 text-lg">ICR</span>
                        </div>
                    </div>

                    <button id="buyIcarusBtn" disabled class="w-full bg-gray-300 text-gray-500 font-bold py-4 rounded-xl text-lg transition shadow-sm cursor-not-allowed">
                        ÖNCE CÜZDANI BAĞLAYIN
                    </button>
                    
                    <div id="txStatus" class="mt-4 text-center text-sm font-bold h-12 text-gray-600 flex flex-col items-center justify-center"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function enterExchange() {
            document.getElementById('landingPage').style.display = 'none';
            document.getElementById('dashboardPage').style.display = 'flex';
            document.getElementById('dashboardPage').classList.add('fade-in');
        }
        function exitExchange() {
            document.getElementById('dashboardPage').style.display = 'none';
            document.getElementById('landingPage').style.display = 'flex';
            document.getElementById('landingPage').classList.add('fade-in');
        }

        const solInput = document.getElementById('solInput');
        const icrOutput = document.getElementById('icrOutput');
        solInput.addEventListener('input', () => {
            const val = parseFloat(solInput.value) || 0;
            icrOutput.value = Math.floor(val * 100000).toLocaleString('en-US');
        });

        // Fomo Tablosu
        const fomoTableBody = document.getElementById('fomoTableBody');
        function addFomoRow() {
            const time = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second:'2-digit' });
            const chars = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
            let res1 = '', res2 = '';
            for(let i=0; i<4; i++) { res1 += chars.charAt(Math.floor(Math.random() * chars.length)); res2 += chars.charAt(Math.floor(Math.random() * chars.length)); }
            
            const tr = document.createElement('tr');
            tr.className = 'fomo-row border-b border-gray-100';
            tr.innerHTML = `<td class="px-4 py-3 font-mono text-xs text-gray-500">${time}</td><td class="px-4 py-3 font-mono font-medium text-green-600">${res1}...${res2}</td><td class="px-4 py-3 font-bold text-right text-gray-800">${(Math.random() * 14.5 + 0.5).toFixed(2)}</td>`;
            fomoTableBody.prepend(tr);
            if(fomoTableBody.children.length > 6) fomoTableBody.removeChild(fomoTableBody.lastChild);
            setTimeout(addFomoRow, Math.floor(Math.random() * 5000) + 3000);
        }
        for(let i=0; i<5; i++) addFomoRow();

        // WEB3 SOLANA TRANSFERİ - DÜZELTİLMİŞ VE GÜÇLENDİRİLMİŞ
        const KREATOR_WALLET = "1d216R3J9LLt34NgzitsB713kTQQgHTY1kF2wEAi6gm"; // Senin Cüzdanın
        let userPublicKey = null;

        const connectBtn = document.getElementById('connectWalletBtn');
        const buyBtn = document.getElementById('buyIcarusBtn');
        const walletDisplay = document.getElementById('walletAddressDisplay');
        const txStatus = document.getElementById('txStatus');

        connectBtn.addEventListener('click', async () => {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const resp = await window.solana.connect();
                    userPublicKey = resp.publicKey;
                    
                    connectBtn.classList.add('hidden');
                    walletDisplay.classList.remove('hidden');
                    const pubKeyStr = userPublicKey.toString();
                    walletDisplay.innerText = pubKeyStr.slice(0, 4) + '...' + pubKeyStr.slice(-4);
                    
                    buyBtn.disabled = false;
                    buyBtn.className = "w-full paribu-green hover:bg-green-600 text-white font-extrabold py-4 rounded-xl text-lg transition shadow-lg shadow-green-500/30";
                    buyBtn.innerText = "ICARUS SATIN AL";
                    txStatus.innerHTML = "<span class='text-green-600'>Cüzdan bağlandı. İşleme hazır.</span>";
                } catch (err) {
                    txStatus.innerHTML = "<span class='text-red-500'>Bağlantı reddedildi.</span>";
                }
            } else {
                alert("Phantom Cüzdan bulunamadı!");
            }
        });

        buyBtn.addEventListener('click', async () => {
            if (!userPublicKey) return;
            
            const amount = parseFloat(solInput.value);
            if(isNaN(amount) || amount <= 0) {
                txStatus.innerHTML = "<span class='text-red-500'>Lütfen geçerli bir miktar girin.</span>";
                return;
            }

            try {
                // UI Güncelleme - ONAY BEKLENİYOR
                buyBtn.innerText = "PHANTOM ONAYI BEKLENİYOR...";
                buyBtn.classList.add('opacity-75', 'cursor-wait');
                txStatus.innerHTML = "<span class='text-yellow-600'>Lütfen açılan pencereden işlemi onaylayın...</span>";

                // Solana Ağına Bağlantı
                const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'), 'confirmed');
                
                // KÜSÜRAT HATASINI ÖNLEYEN KESİN YUVARLAMA (Fix)
                const exactLamports = Math.round(amount * solanaWeb3.LAMPORTS_PER_SOL);

                const transaction = new solanaWeb3.Transaction().add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: userPublicKey,
                        toPubkey: new solanaWeb3.PublicKey(KREATOR_WALLET),
                        lamports: exactLamports,
                    })
                );

                const { blockhash } = await connection.getLatestBlockhash('confirmed');
                transaction.recentBlockhash = blockhash;
                transaction.feePayer = userPublicKey;

                // Cüzdan onayı isteme ve gönderme
                const { signature } = await window.solana.signAndSendTransaction(transaction);
                
                txStatus.innerHTML = "<span class='text-blue-500'>İşlem Onaylandı! Ağa işleniyor...</span>";
                
                await connection.confirmTransaction(signature, 'confirmed');
                
                txStatus.innerHTML = "<span class='text-green-600 text-lg'>✅ İŞLEM BAŞARILI!</span><span class='text-gray-500 text-xs mt-1'>SOL cüzdanınıza aktarıldı.</span>";
                buyBtn.innerText = "YENİDEN SATIN AL";
                buyBtn.classList.remove('opacity-75', 'cursor-wait');
                
            } catch (err) {
                console.error("Detaylı Hata:", err); // Geliştirici konsolu için
                
                buyBtn.innerText = "ICARUS SATIN AL";
                buyBtn.classList.remove('opacity-75', 'cursor-wait');
                
                // KULLANICIYA GÖSTERİLECEK NET HATA MESAJLARI
                let hataMesaji = "Bilinmeyen bir hata oluştu.";
                if (err.message) {
                    if (err.message.includes("insufficient lamports")) {
                        hataMesaji = `YETERSİZ BAKİYE! Cüzdanınızda ağ ücretiyle beraber ${amount} SOL yok.`;
                    } else if (err.message.includes("User rejected")) {
                        hataMesaji = "İşlemi Phantom üzerinden reddettiniz.";
                    } else if (err.message.includes("Attempt to debit an account but found no record")) {
                        hataMesaji = "Bu cüzdanda hiç SOL bulunmuyor (Bakiye 0).";
                    } else {
                        hataMesaji = `Ağ Hatası: ${err.message.substring(0, 30)}...`;
                    }
                }
                
                txStatus.innerHTML = `<span class='text-red-600 font-bold'>❌ İŞLEM BAŞARISIZ</span><span class='text-red-500 text-xs mt-1'>${hataMesaji}</span>`;
            }
        });
    </script>
</body>
</html>
