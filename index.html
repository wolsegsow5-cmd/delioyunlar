<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DELİ OYUNLAR</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ff0000; font-size: 50px; text-shadow: 2px 2px #fff; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 40px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; max-width: 1200px; margin: auto; }
        .oyun-penceresi { background: #111; border: 4px solid #ff0000; border-radius: 15px; padding: 15px; width: 350px; transition: 0.3s; }
        .oyun-penceresi:hover { transform: scale(1.05); box-shadow: 0 0 20px #ff0000; }
        iframe { width: 100%; height: 250px; border: none; border-radius: 10px; background: #222; }
        h3 { margin-top: 15px; font-size: 22px; text-transform: uppercase; }
        footer { margin-top: 50px; color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <h1>DELİ OYUNLAR</h1>
    <p>Engelleri Yıktık! Oyunlar Direkt Sitenin İçinde Açılır.</p>

    <div class="grid">
        <div class="oyun-penceresi">
            <iframe src="https://www.crazygames.com/embed/moto-x3m"></iframe>
            <h3>Moto X3M (Motor)</h3>
        </div>

        <div class="oyun-penceresi">
            <iframe src="https://www.crazygames.com/embed/smash-karts"></iframe>
            <h3>Smash Karts (Savaş)</h3>
        </div>

        <div class="oyun-penceresi">
            <iframe src="https://www.crazygames.com/embed/shellshockersio"></iframe>
            <h3>Shell Shockers (Silah)</h3>
        </div>
        
        <div class="oyun-penceresi">
            <iframe src="https://www.crazygames.com/embed/basketball-stars-2019"></iframe>
            <h3>Basketbol Yıldızları</h3>
        </div>
    </div>

    <footer>
        &copy; 2026 Vak Vak Yatırım Dünyası | Dupscoin Global
    </footer>

</body>
</html>
