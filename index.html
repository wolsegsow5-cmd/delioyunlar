<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DELİ OYUNLAR</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Arial Black', sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { font-size: 50px; text-shadow: 3px 3px #fff; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .kart { background: #111; border: 3px solid #ff0000; border-radius: 15px; padding: 15px; transition: 0.3s; }
        .kart:hover { transform: translateY(-10px); box-shadow: 0 0 20px #ff0000; }
        .kart img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .btn { background: #ff0000; color: #fff; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 8px; text-decoration: none; display: block; }
    </style>
</head>
<body>
    <h1>DELİ OYUNLAR</h1>
    <div class="grid">
        <div class="kart">
            <img src="https://img.gamedistribution.com/26466986689d4606b006509f7a93a388-512x512.jpeg">
            <h3>MOTO X3M</h3>
            <a href="https://html5.gamedistribution.com/26466986689d4606b006509f7a93a388" target="_blank" class="btn">DELİCE OYNA</a>
        </div>
        <div class="kart">
            <img src="https://img.gamedistribution.com/695938cc240149799ab7630737402636-512x512.jpeg">
            <h3>OM NOM RUN</h3>
            <a href="https://html5.gamedistribution.com/695938cc240149799ab7630737402636" target="_blank" class="btn">DELİCE OYNA</a>
        </div>
        <div class="kart">
            <img src="https://img.gamedistribution.com/ad099f667d404d098a58a98f1211e42a-512x512.jpeg">
            <h3>PENALTI ÇEKME</h3>
            <a href="https://html5.gamedistribution.com/ad099f667d404d098a58a98f1211e42a" target="_blank" class="btn">DELİCE OYNA</a>
        </div>
    </div>
</body>
</html>
