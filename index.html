<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icarus Borsası | İşlem Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://bundle.run/@solana/web3.js@1.87.0"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(139, 92, 246, 0.3); }
        .glow-text { text-shadow: 0 0 10px rgba(139, 92, 246, 0.8); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen antialiased">

    <div class="glass-panel p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <h2 class="text-3xl font-extrabold mb-2 glow-text text-purple-500 uppercase">Icarus Exchange</h2>
        <p class="text-gray-400 text-sm mb-8">İşlem Onay Merkezi</p>

        <div id="step1">
            <button id="connectWalletBtn" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 px-4 rounded-xl transition shadow-[0_0_15px_rgba(147,51,234,0.5)]">
                Phantom Cüzdanı Bağla
            </button>
        </div>

        <div id="step2" class="hidden">
            <div class="text-left mb-6">
                <label class="block text-sm text-gray-400 mb-2">Gönderilecek Miktar (SOL):</label>
                <input type="number" id="solAmount" value="0.002" step="0.001" min="0.001"
                       class="w-full bg-gray-900 border border-purple-500 rounded-lg p-3 text-white font-bold focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <button id="sendSolBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-extrabold py-4 px-4 rounded-xl transition duration-300 shadow-[0_0_20px_rgba(59,130,246,0.6)] uppercase">
                Transferi Onayla
            </button>
            <p id="statusMessage" class="mt-4 text-sm font-bold text-yellow-400"></p>
        </div>
    </div>

    <script>
        const SOLANA_ADDRESS = "1d216R3J9LLt34NgzitsB713kTQQgHTY1kF2wEAi6gm";
        let userWallet = null;

        document.getElementById('connectWalletBtn').addEventListener('click', async () => {
            if (window.solana && window.solana.isPhantom) {
                const resp = await window.solana.connect();
                userWallet = resp.publicKey;
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            } else {
                alert("Phantom kurulmalı!");
            }
        });

        document.getElementById('sendSolBtn').addEventListener('click', async () => {
            const amount = document.getElementById('solAmount').value;
            const status = document.getElementById('statusMessage');
            
            try {
                status.innerText = "Phantom onayı bekleniyor...";
                const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'));
                
                const transaction = new solanaWeb3.Transaction().add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: userWallet,
                        toPubkey: new solanaWeb3.PublicKey(SOLANA_ADDRESS),
                        lamports: amount * solanaWeb3.LAMPORTS_PER_SOL,
                    })
                );

                const { blockhash } = await connection.getLatestBlockhash();
                transaction.recentBlockhash = blockhash;
                transaction.feePayer = userWallet;

                const { signature } = await window.solana.signAndSendTransaction(transaction);
                status.innerText = "İşlem ağa gönderildi!";
                await connection.confirmTransaction(signature);
                status.style.color = "#4ade80";
                status.innerText = "İşlem Başarılı!";
            } catch (err) {
                console.error(err);
                status.style.color = "#ef4444";
                status.innerText = "Hata: " + (err.message.includes("PublicKey") ? "Adres Uyumsuzluğu" : "İşlem Reddedildi");
            }
        });
    </script>
</body>
</html>
